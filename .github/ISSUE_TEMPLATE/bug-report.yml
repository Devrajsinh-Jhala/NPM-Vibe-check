name: Bug report
about: Report incorrect CLI behavior or a compatibility issue
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: npx-vibe version
      placeholder: 1.2.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux, Other]
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js and npm versions
      placeholder: Node 22.14.0 / npm 11.1.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Redact secrets before submitting.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
