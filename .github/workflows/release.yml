name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish verified package
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --ignore-scripts
      - run: npm run verify
      - run: npm run smoke:pack
      - name: Verify tag matches package version
        run: test "v$(node -p 'require("./package.json").version')" = "$GITHUB_REF_NAME"
      - name: Check registry state
        id: registry
        shell: bash
        run: |
          package_name="$(node -p 'require("./package.json").name')"
          package_version="$(node -p 'require("./package.json").version')"
          if npm view "${package_name}@${package_version}" version --json >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish with npm provenance
        if: steps.registry.outputs.already_published != 'true'
        run: npm publish --access public --provenance
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
